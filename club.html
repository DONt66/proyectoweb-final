<body>
    <header>
        <div class="logo">
            <a href="index.html"><img src="sources/icono.png" alt="logo"></a>
            <h1 class="titulo"><a href="index.html">DONETVERSE</a></h1>
        </div>
        <nav>
            <a href="ps5.html" class="botones-header">PS5</a>
            <a href="ps4.html" class="botones-header">PS4</a>
            <a href="xboxseries.html" class="botones-header">Xbox Series</a>

             <div class="desplegable">
                <a href="#" class="botones-header">Accesorios 🡣</a>
                <div class="contenido-desplegable">
                    <a href="acps5.html">PS5</a>
                    <a href="acps4.html">PS4</a>
                    <a href="acxobseries.html">Xbox Series</a>

                </div>
            </div>
            <a href="club.html" class="boton-header-club">Club</a>
        </nav>
    </header>
 
    <div class="formulario">
    <fieldset class="caja">
        <legend class="titulo-clubdonetverse"><strong>CLUB DONETVERSE</strong></legend>
        <label class="datos-personales">Datos personales</label>
        <br>
        <input class="valor" type="text" placeholder="Nombre">
        <input class="valor" type="text" placeholder="Apellidos">
        <input class="valor" type="email" placeholder="Correo electrónico">
        <input class="valor" type="password" placeholder="Contraseña">
        <input class="valor" type="password" placeholder="Repita contraseña">
        <input class="valor" type="tel" placeholder="Número de teléfono">
        <input class="valor" type="date">
        <select class="valor" name="Sexo">
            <option value="" disabled selected hidden>Sexo</option>
            <option value="hombre">Hombre</option>
            <option value="mujer">Mujer</option>
            <option value="prefieronodecirlo">Prefiero no decirlo</option>
        </select>

        <!-- RADIO BUTTONS -->
        <label class="datos-personales">Tipo de membresía</label>
        <div class="grupo-opciones">
            <label class="opcion-radio">
                <input type="radio" name="membresia" value="basica">
                <span class="custom-radio">Básica</span>
            </label>
            <label class="opcion-radio">
                <input type="radio" name="membresia" value="premium">
                <span class="custom-radio">Premium</span>
            </label>
        </div>

        <!-- CHECKBOXES -->
        <label class="datos-personales">Preferencias</label>
        <div class="grupo-opciones">
            <label class="opcion-check">
                <input type="checkbox" name="ofertas">
                <span class="custom-check">Recibir ofertas exclusivas</span>
            </label>
            <label class="opcion-check">
                <input type="checkbox" name="sorteos">
                <span class="custom-check">Recibir notificaciones de sorteos</span>
            </label>
        </div>

        <br>
        <button class="boton-registrarse" onclick="location.href='welcome.html'">Unirse</button>

        <button class="boton-reset" type="reset">↺ Limpiar formulario</button>

        <p class="iniciar-sesion">¿Ya eres miembro? Inicia sesión</p>
        <button class="boton-sesion" onclick="location.href='iniciosesion.html'">Iniciar sesión</button>
    </fieldset>
    </div>

        </div>
    </footer>
</body>
